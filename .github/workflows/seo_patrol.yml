name: Daily SEO Patrol

# on:
#   schedule:
#     # 毎日22:00 UTC = 07:00 JST (一時停止中)
#     - cron: '0 22 * * *'
on:
  workflow_dispatch: # 手動実行のみ

jobs:
  patrol:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Node.js 24への移行対応
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright beautifulsoup4 requests
          playwright install --with-deps chromium # 依存OSライブラリも含めてインストール

      - name: Run SEO Patrol
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python div-lighthouse-studio/src/daily_seo_patrol.py
